<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <section>
      <div>
        <table>
          <thead>
            <tr>
              <th>S.No</th>
              <th>Books</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody>
            {% for book in books %}
            <tr>
              <td>{{ loop.index }}</td>
              <td>
                <a
                  href="{{url}}/{{book.uid}}"
                  target="_blank"
                  class="text-blue-600 hover:underline"
                >
                  {{ book.filename }}
                </a>
              </td>
              <td>{{book.updated_at.strftime('%d-%m-%Y %H:%M %Z')}}</td>
              <td>
                <form method="post" action="/books/delete/{{ book.id }}">
                  <button type="submit" class="text-red-500 hover:text-red-700">
                    🗑️
                  </button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
